server:
  servlet:
    context-path: /sale-system
  shutdown: graceful

spring:
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB
  application:
    name: sale-system
  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Ho_Chi_Minh
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE}
      idle-timeout: 600000
      max-lifetime: 1800000

logging:
  level:
    org:
      hibernate.SQL: INFO
      hibernate.orm.connections.pooling: DEBUG
      hibernate.orm.jdbc.bind: OFF
    com:
      zaxxer.hikari: DEBUG

