app:
  auth:
    username: ${APP_AUTH_USERNAME}
    password: ${APP_AUTH_PASSWORD}
    jwt-secret: ${APP_JWT_SECRET}
    jwt-expiration-ms: ${APP_JWT_EXPIRATION_MS}